<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urban Leaf - Pro Social Media Kit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.js" defer></script>
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans pb-24">

    <header class="bg-white p-4 shadow-sm border-b border-gray-100 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-green-600 text-white p-2.5 rounded-full h-10 w-10 flex items-center justify-center">
                <i class="fa-solid fa-leaf text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-green-800">Urban Leaf <span
                        class="text-gray-500 font-medium text-sm">Studio</span></h1>
                <p class="text-xs text-gray-500">Watermark, Presets & Post</p>
            </div>
        </div>
        <div class="flex gap-2">
            <label for="baseImage"
                class="bg-gray-800 text-white p-2.5 rounded-full shadow hover:bg-black cursor-pointer flex items-center justify-center w-10 h-10">
                <i class="fa-solid fa-camera"></i>
            </label>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-6">

        <input type="file" id="baseImage" accept="image/*" class="hidden">
        <input type="file" id="watermarkImage" accept="image/png" class="hidden">

        <div id="previewBox"
            class="bg-white p-2 rounded-xl shadow-lg border border-gray-200 flex flex-col justify-center items-center relative overflow-hidden shadow-inner rounded-t-none"
            style="min-height: 300px;">

            <label id="uploadLabel" for="baseImage"
                class="text-gray-400 text-sm text-center flex flex-col items-center justify-center gap-3 p-12 cursor-pointer w-full h-full absolute inset-0 bg-white z-10 hover:bg-gray-50">
                <i class="fa-regular fa-image text-5xl text-gray-300"></i>
                <div>Tap here to upload your plant photo.</div>
            </label>

            <canvas id="canvas" class="max-w-full object-contain hidden shadow-xl rounded z-20" style="max-height: 65vh; display: none;"></canvas>
        </div>

        <div class="space-y-4">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" onclick="toggleCard('filterCard')"
                    class="w-full flex items-center justify-between p-5 hover:bg-gray-50 focus:outline-none">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-wand-magic-sparkles text-xl text-green-600"></i>
                        <span class="text-lg font-bold">1. Natural Plant Presets</span>
                    </div>
                    <i id="filterCardIcon" class="fa-solid fa-chevron-down text-gray-400"></i>
                </button>
                <div id="filterCardContent" class="hidden p-5 pt-0 space-y-5 border-t border-gray-100">

                    <p class="text-sm font-bold text-gray-600 uppercase">Select a Preset for Nature</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" onclick="applyPreset(this, 'natural')"
                            class="preset-btn p-4 border-2 border-gray-200 rounded-xl bg-gray-50 flex flex-col items-center gap-1 hover:border-green-300 focus:outline-none">
                            <i class="fa-solid fa-leaf text-2xl text-green-700"></i>
                            <span class="text-xs font-semibold">Natural Boost</span>
                        </button>
                        <button type="button" onclick="applyPreset(this, 'greens')"
                            class="preset-btn p-4 border-2 border-gray-200 rounded-xl bg-gray-50 flex flex-col items-center gap-1 hover:border-green-300 focus:outline-none">
                            <i class="fa-solid fa-tree text-2xl text-green-800"></i>
                            <span class="text-xs font-semibold">Lush Greens</span>
                        </button>
                        <button type="button" onclick="applyPreset(this, 'blooms')"
                            class="preset-btn p-4 border-2 border-gray-200 rounded-xl bg-gray-50 flex flex-col items-center gap-1 hover:border-green-300 focus:outline-none">
                            <i class="fa-solid fa-spa text-2xl text-pink-600"></i>
                            <span class="text-xs font-semibold">Vibrant Blooms</span>
                        </button>
                        <button type="button" onclick="applyPreset(this, 'rustic')"
                            class="preset-btn p-4 border-2 border-gray-200 rounded-xl bg-gray-50 flex flex-col items-center gap-1 hover:border-green-300 focus:outline-none">
                            <i class="fa-solid fa-cubes text-2xl text-gray-500"></i>
                            <span class="text-xs font-semibold">Rustic Clean</span>
                        </button>
                    </div>

                    <details class="bg-gray-50 p-4 rounded-xl">
                        <summary
                            class="text-xs font-bold text-gray-600 cursor-pointer flex justify-between items-center focus:outline-none">
                            Fine-tune Advanced <i class="fa-solid fa-sliders text-gray-400"></i></summary>
                        <div class="space-y-4 pt-4">
                            <div>
                                <label class="text-xs text-gray-600 flex justify-between mb-1">Brightness <span
                                        id="brightVal">100%</span></label>
                                <input type="range" id="filterBright" min="50" max="150" value="100"
                                    class="w-full h-2 accent-green-600 rounded-full">
                            </div>
                            <div>
                                <label class="text-xs text-gray-600 flex justify-between mb-1">Contrast <span
                                        id="contrastVal">100%</span></label>
                                <input type="range" id="filterContrast" min="50" max="150" value="100"
                                    class="w-full h-2 accent-green-600 rounded-full">
                            </div>
                            <div>
                                <label class="text-xs text-gray-600 flex justify-between mb-1">Saturation <span
                                        id="satVal">100%</span></label>
                                <input type="range" id="filterSat" min="0" max="200" value="100"
                                    class="w-full h-2 accent-green-600 rounded-full">
                            </div>
                        </div>
                    </details>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" onclick="toggleCard('wmCard')"
                    class="w-full flex items-center justify-between p-5 hover:bg-gray-50 focus:outline-none">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-stamp text-xl text-green-600"></i>
                        <span class="text-lg font-bold">2. Watermark & Logo</span>
                    </div>
                    <i id="wmCardIcon" class="fa-solid fa-chevron-down text-gray-400"></i>
                </button>
                <div id="wmCardContent" class="hidden p-5 pt-0 space-y-5 border-t border-gray-100">

                    <div class="flex flex-col gap-2">
                        <label for="watermarkImage"
                            class="w-full bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 font-semibold py-3 px-4 rounded-xl transition duration-200 text-sm flex justify-center items-center gap-2 cursor-pointer">
                            <i class="fa-solid fa-upload"></i> Upload "Urban Leaf" Logo
                        </label>
                        <div id="logoStatus" class="hidden text-xs text-green-700 bg-green-50 border border-green-200 rounded-lg px-3 py-2 flex items-center gap-2">
                            <i class="fa-solid fa-circle-check"></i> Logo loaded! Adjust the sliders below.
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-5 mt-4">
                        <div>
                            <label class="text-xs text-gray-600 font-bold block mb-2">Size</label>
                            <input type="range" id="wmSize" min="5" max="100" value="30"
                                class="w-full h-2 accent-green-600 rounded-full">
                        </div>
                        <div>
                            <label class="text-xs text-gray-600 font-bold block mb-2">Opacity</label>
                            <input type="range" id="wmOpacity" min="10" max="100" value="80"
                                class="w-full h-2 accent-green-600 rounded-full">
                        </div>
                        <div>
                            <label class="text-xs text-gray-600 font-bold block mb-2">Position X</label>
                            <input type="range" id="wmPosX" min="0" max="100" value="10"
                                class="w-full h-2 accent-green-600 rounded-full">
                        </div>
                        <div>
                            <label class="text-xs text-gray-600 font-bold block mb-2">Position Y</label>
                            <input type="range" id="wmPosY" min="0" max="100" value="10"
                                class="w-full h-2 accent-green-600 rounded-full">
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <button type="button" onclick="toggleCard('postCard')"
                    class="w-full flex items-center justify-between p-5 hover:bg-gray-50 focus:outline-none">
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-facebook text-xl text-blue-600"></i>
                        <span class="text-lg font-bold">3. Post Generator</span>
                    </div>
                    <i id="postCardIcon" class="fa-solid fa-chevron-down text-gray-400"></i>
                </button>
                <div id="postCardContent" class="hidden p-5 pt-0 space-y-5 border-t border-gray-100">

                    <div class="space-y-3 mb-4">
                        <div>
                            <label class="text-xs font-bold text-gray-600">Plant Name</label>
                            <input type="text" id="plantName" placeholder="e.g., Sakunthala Flash"
                                class="w-full p-3 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-600">Condition/Price</label>
                            <input type="text" id="plantCondition" value="මෙම කඳ පැලය විකිණීමට ඇත"
                                class="w-full p-3 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>

                    <button type="button" onclick="generateCaption()"
                        class="w-full bg-blue-50 text-blue-700 hover:bg-blue-100 border border-blue-200 font-semibold py-3 px-4 rounded-lg transition duration-200 text-sm flex justify-center items-center gap-2 focus:outline-none">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Viral Caption
                    </button>

                    <div class="relative">
                        <textarea id="captionOutput" rows="7"
                            class="w-full p-3 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:bg-white resize-none focus:outline-none"
                            placeholder="FB caption with hashtags..."></textarea>
                        <button type="button" onclick="copyCaption(this)"
                            class="absolute bottom-3 right-3 bg-gray-800 hover:bg-black text-white p-2.5 rounded text-xs shadow flex items-center gap-1.5 focus:outline-none">
                            <i class="fa-regular fa-copy"></i> Copy
                        </button>
                    </div>

                    <div class="mt-4 pt-4 border-t border-gray-100">
                        <label class="text-xs text-gray-600 font-bold block mb-1">Image Metadata Name (Hidden)</label>
                        <input type="text" id="metaAuthor" value="Urban Leaf Sri Lanka"
                            class="w-full p-3 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:outline-none">
                    </div>
                </div>
            </div>

        </div>

        <div
            class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] border-t border-gray-200 z-50 flex justify-center max-w-4xl mx-auto rounded-t-2xl">
            <button type="button" onclick="downloadImage()"
                class="w-full max-w-sm bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-2xl shadow-xl transition duration-200 flex justify-center items-center gap-3 text-lg focus:outline-none">
                <i class="fa-solid fa-download text-xl"></i> Save HD Image + Meta
            </button>
        </div>

    </main>

    <script>
        // Wait for DOM to load fully to prevent undefined errors
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Expose logic globally so inline HTML onclicks can use them
            window.baseImgObj = null;
            window.wmImgObj = null;

            const inputs = ['wmSize', 'wmOpacity', 'wmPosX', 'wmPosY', 'filterBright', 'filterContrast', 'filterSat'];

            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', () => {
                        window.updateLabels();
                        window.drawCanvas();
                    });
                }
            });

            // Base Image Upload Logic
            document.getElementById('baseImage').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (event) {
                    window.baseImgObj = new Image();
                    window.baseImgObj.onload = function () {
                        canvas.width = window.baseImgObj.width;
                        canvas.height = window.baseImgObj.height;

                        // Show canvas, hide placeholder
                        canvas.style.display = 'block';
                        canvas.classList.remove('hidden');
                        document.getElementById('uploadLabel').classList.add('hidden');

                        // Lock preview box height to current rendered size to prevent layout jump
                        const previewBox = document.getElementById('previewBox');
                        if (previewBox) {
                            // Remove min-height constraint so canvas drives the height naturally
                            previewBox.style.minHeight = 'unset';
                        }

                        window.drawCanvas();
                        window.toggleCard('filterCard'); // Open presets card
                    }
                    window.baseImgObj.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });

            // Watermark Image Upload Logic
            document.getElementById('watermarkImage').addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function (event) {
                    window.wmImgObj = new Image();
                    window.wmImgObj.onload = function () {
                        window.drawCanvas();
                        // Show success badge instead of auto-opening card (which caused page jump)
                        const logoStatus = document.getElementById('logoStatus');
                        if (logoStatus) {
                            logoStatus.classList.remove('hidden');
                            logoStatus.classList.add('flex');
                        }
                    };
                    window.wmImgObj.src = event.target.result;
                }
                reader.readAsDataURL(file);
            });

            window.updateLabels = function () {
                document.getElementById('brightVal').innerText = document.getElementById('filterBright').value + '%';
                document.getElementById('contrastVal').innerText = document.getElementById('filterContrast').value + '%';
                document.getElementById('satVal').innerText = document.getElementById('filterSat').value + '%';
            };

            window.drawCanvas = function () {
                if (!window.baseImgObj) return;

                const bright = document.getElementById('filterBright').value;
                const contrast = document.getElementById('filterContrast').value;
                const sat = document.getElementById('filterSat').value;

                ctx.filter = `brightness(${bright}%) contrast(${contrast}%) saturate(${sat}%)`;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(window.baseImgObj, 0, 0);

                ctx.filter = 'none';

                if (window.wmImgObj) {
                    const sizeScale = document.getElementById('wmSize').value / 100;
                    const opacity = document.getElementById('wmOpacity').value / 100;
                    const posX = document.getElementById('wmPosX').value / 100;
                    const posY = document.getElementById('wmPosY').value / 100;

                    ctx.globalAlpha = opacity;

                    const wmWidth = canvas.width * sizeScale;
                    const wmHeight = (window.wmImgObj.height / window.wmImgObj.width) * wmWidth;
                    const x = (canvas.width - wmWidth) * posX;
                    const y = (canvas.height - wmHeight) * posY;

                    ctx.drawImage(window.wmImgObj, x, y, wmWidth, wmHeight);
                    ctx.globalAlpha = 1.0;
                }
            };
        });

        // Toggle Cards Function
        function toggleCard(cardId) {
            const content = document.getElementById(cardId + 'Content');
            const icon = document.getElementById(cardId + 'Icon');
            if (!content || !icon) return;

            const isHidden = content.classList.contains('hidden');

            // Close all
            document.querySelectorAll('[id$="Content"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id$="Icon"]').forEach(el => {
                el.classList.remove('fa-chevron-up', 'text-green-700');
                el.classList.add('fa-chevron-down', 'text-gray-400');
            });

            if (isHidden) {
                content.classList.remove('hidden');
                icon.classList.remove('fa-chevron-down', 'text-gray-400');
                icon.classList.add('fa-chevron-up', 'text-green-700');
            }
        }

        // Apply Presets (Fixed to accept the button element directly)
        function applyPreset(btnElement, presetType) {
            if (!window.baseImgObj) {
                alert("Please upload your plant photo first.");
                return;
            }

            const bInput = document.getElementById('filterBright');
            const cInput = document.getElementById('filterContrast');
            const sInput = document.getElementById('filterSat');

            switch (presetType) {
                case 'natural':
                    bInput.value = 105; cInput.value = 110; sInput.value = 110;
                    break;
                case 'greens':
                    bInput.value = 110; cInput.value = 120; sInput.value = 130;
                    break;
                case 'blooms':
                    bInput.value = 100; cInput.value = 110; sInput.value = 150;
                    break;
                case 'rustic':
                    bInput.value = 105; cInput.value = 125; sInput.value = 100;
                    break;
            }

            window.updateLabels();
            window.drawCanvas();

            // UI Update for buttons
            document.querySelectorAll('.preset-btn').forEach(el => {
                el.classList.remove('border-green-600', 'bg-green-50');
            });
            if (btnElement) {
                btnElement.classList.add('border-green-600', 'bg-green-50');
            }
        }

        // Generate FB Caption
        function generateCaption() {
            const plantName = document.getElementById('plantName').value || "Anthurium Plant";
            const condition = document.getElementById('plantCondition').value;
            const hashName = plantName.replace(/[^a-zA-Z0-9]/g, '');

            const caption = `🌸 ${plantName.toUpperCase()} 🌸\n\n🌱 ${condition}\n🚚 Island-wide Courier Facilities Available (ශ්‍රී ලංකාව පුරා කුරියර් පහසුකම්)\n💳 Island-wide Bank Transfer only. No COD.\n📞 Inbox us or call for more details.\n📍 Place your order soon.\n\n#AnthuriumLovers #AnthuriumSriLanka #SriLankaPlants #indoorplants #Anthuriums #${hashName} #Trending #AnthuriumForSale`;

            document.getElementById('captionOutput').value = caption;
        }

        // Copy FB Caption (Fixed element reference)
        function copyCaption(btnElement) {
            const text = document.getElementById('captionOutput').value;
            if (!text) {
                alert("Please generate a caption first.");
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                const originalHtml = btnElement.innerHTML;
                btnElement.classList.add('bg-green-700', 'text-white');
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Copied';

                setTimeout(() => {
                    btnElement.classList.remove('bg-green-700', 'text-white');
                    btnElement.innerHTML = originalHtml;
                }, 2000);
            }).catch(err => {
                alert('Could not copy text automatically. Please select and copy manually.');
            });
        }

        // Download Image
        function downloadImage() {
            if (!window.baseImgObj) {
                alert("Please upload your plant photo first!");
                return;
            }

            let jpegData = canvas.toDataURL('image/jpeg', 0.95);

            try {
                if (typeof piexif !== 'undefined') {
                    const author = document.getElementById('metaAuthor').value;
                    const zerothIfd = {};
                    zerothIfd[piexif.ImageIFD.Artist] = author;
                    zerothIfd[piexif.ImageIFD.Copyright] = author;
                    zerothIfd[piexif.ImageIFD.Software] = "Urban Leaf Studio v1.5";

                    const exifObj = { "0th": zerothIfd };
                    const exifBytes = piexif.dump(exifObj);
                    jpegData = piexif.insert(exifBytes, jpegData);
                }
            } catch (e) {
                console.log("Metadata skipped", e);
            }

            const link = document.createElement('a');
            link.download = `UrbanLeaf_${Date.now()}.jpg`;
            link.href = jpegData;
            link.click();
        }
    </script>
</body>

</html>
